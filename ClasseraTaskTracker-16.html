<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Classera Task Tracker</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: "Segoe UI", system-ui, sans-serif; background: #F0F4F8; }
    select, input, button { font-family: inherit; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, Fragment } = React;



const CATEGORIES = ["CEO Decision","Client Experience","Corporate Structure & Compliance","Financial Health","Growth & Revenue","People & Organization","Product & Innovation","Standardize & Automate"];
const AVATAR_COLORS = ["#1B2A4A","#2E7D52","#1E5799","#7B241C","#6B46C1","#065F46","#92400E","#1E40AF","#7C3AED","#0F766E","#9D174D","#1D4ED8","#047857","#B45309","#374151"];
const STATUS_KEYS = ["Not Started","In Progress","Completed"];
const PRIORITY_CFG = {"Critical":{bg:"#F3E8FF",text:"#6B21A8",border:"#9333EA"},"High":{bg:"#FDECEA",text:"#7B241C",border:"#E74C3C"},"Medium":{bg:"#FEF3C7",text:"#7D4E00",border:"#F59E0B"},"Low":{bg:"#E8F8F5",text:"#1E8449",border:"#2ECC71"}};

function PriorityBadge({ priority }) {
  const c = PRIORITY_CFG[priority] || PRIORITY_CFG["Medium"];
  return <span style={{background:c.bg,color:c.text,border:"1px solid "+c.border,padding:"2px 8px",borderRadius:4,fontSize:11,fontWeight:700}}>{priority}</span>;
}

function ProgressBar({ done, total }) {
  const pct = total === 0 ? 0 : Math.round((done/total)*100);
  const color = pct===100?"#28A745":pct>=50?"#2980B9":"#F59E0B";
  return (
    <div style={{display:"flex",alignItems:"center",gap:8}}>
      <div style={{flex:1,height:6,background:"#E2E8F0",borderRadius:3,overflow:"hidden"}}>
        <div style={{width:pct+"%",height:"100%",background:color,borderRadius:3}} />
      </div>
      <span style={{fontSize:11,fontWeight:700,color,minWidth:30}}>{pct}%</span>
    </div>
  );
}

function App() {
  const [tasks, setTasks] = useState([]);
  const [owners, setOwners] = useState([]);
  const [view, setView] = useState("dashboard");
  const [selectedOwner, setSelectedOwner] = useState(null);
  const [filterStatus, setFilterStatus] = useState("All");
  const [filterPriority, setFilterPriority] = useState("All");
  const [filterCategory, setFilterCategory] = useState("All");
  const [filterOwnerFilter, setFilterOwnerFilter] = useState("All");
  const [searchQ, setSearchQ] = useState("");
  const [showAdd, setShowAdd] = useState(false);
  const [newTask, setNewTask] = useState({name:"",category:"",priority:"Medium",due:"",status:"Not Started",notes:""});
  const [confirmDeleteId, setConfirmDeleteId] = useState(null);
  const [confirmDeleteOwnerId, setConfirmDeleteOwnerId] = useState(null);
  const [editTask, setEditTask] = useState(null); // holds task being edited
  const [uploadMsg, setUploadMsg] = useState(null); // {type:"success"|"error", text}
  const [showAddOwner, setShowAddOwner] = useState(false);
  const [newOwner, setNewOwner] = useState({name:"",dept:""});
  const [loaded, setLoaded] = useState(false);
  const [comments, setComments] = useState({});
  const [commentInput, setCommentInput] = useState({});
  const [activeCommentTask, setActiveCommentTask] = useState(null);
  const [taskColWidth, setTaskColWidth] = useState(280);

  const TODAY = new Date().toISOString().split("T")[0];
  const isOverdue = (t) => !!(t.due && t.due < TODAY && t.status !== "Completed");
  const daysOverdue = (t) => {
    if (!t.due || t.status === "Completed") return 0;
    const diff = Math.floor((new Date(TODAY) - new Date(t.due)) / 86400000);
    return diff > 0 ? diff : 0;
  };

  useEffect(() => {
    try {
      // First check for embedded snapshot data (shared files)
      const snapshotEl = document.getElementById("snapshot-data");
      if (snapshotEl) {
        const d = JSON.parse(snapshotEl.textContent);
        if (d.tasks) setTasks(d.tasks);
        if (d.owners) setOwners(d.owners);
        if (d.comments) setComments(d.comments);
      }
    } catch(e) {
      console.warn("Storage load failed:", e);
    } finally {
      setLoaded(true);
    }
  }, []);

  const getStats = (ownerId) => {
    const t = ownerId ? tasks.filter(x=>x.ownerId===ownerId) : tasks;
    return {total:t.length,completed:t.filter(x=>x.status==="Completed").length,inProgress:t.filter(x=>x.status==="In Progress").length,notStarted:t.filter(x=>x.status==="Not Started").length,overdue:t.filter(x=>isOverdue(x)).length};
  };

  const global = getStats(null);
  const owner = owners.find(o=>o.id===selectedOwner);
  const ownerIdx = owners.findIndex(o=>o.id===selectedOwner);
  const ownerStats = selectedOwner ? getStats(selectedOwner) : null;

  const filteredTasks = useMemo(() => {
    let t = selectedOwner ? tasks.filter(x=>x.ownerId===selectedOwner) : tasks;
    if (filterStatus !== "All") t = t.filter(x=>x.status===filterStatus);
    if (filterPriority !== "All") t = t.filter(x=>x.priority===filterPriority);
    if (filterCategory !== "All") t = t.filter(x=>x.category===filterCategory);
    if (filterOwnerFilter !== "All") t = t.filter(x=>x.ownerId===parseInt(filterOwnerFilter));
    if (searchQ.trim()) t = t.filter(x=>x.name.toLowerCase().includes(searchQ.toLowerCase()));
    return [...t].sort((a,b)=>(isOverdue(b)?1:0)-(isOverdue(a)?1:0));
  }, [tasks, selectedOwner, filterStatus, filterPriority, filterCategory, filterOwnerFilter, searchQ]);

  // Global sequential numbering — stable by original insertion order
  const seqNum = useMemo(() => {
    const map = {};
    tasks.forEach((t, i) => { map[t.id] = i + 1; });
    return map;
  }, [tasks]);

  const overdueTasks = tasks.filter(t=>isOverdue(t)).sort((a,b)=>daysOverdue(b)-daysOverdue(a));
  const maxOD = Math.max(...owners.map(o=>tasks.filter(t=>t.ownerId===o.id&&isOverdue(t)).length),1);

  const we = new Date(); we.setDate(we.getDate()+7);
  const weStr = we.toISOString().split("T")[0];
  const thisWeek = tasks.filter(t=>t.due&&t.due>=TODAY&&t.due<=weStr&&t.status!=="Completed");
  const thisMonth = tasks.filter(t=>t.due&&t.due>=TODAY&&t.due.slice(0,7)===TODAY.slice(0,7)&&t.status!=="Completed");

  const navTo = (v,oid=null) => { setView(v); setSelectedOwner(oid); setFilterStatus("All"); setFilterPriority("All"); setFilterCategory("All"); setFilterOwnerFilter("All"); setSearchQ(""); setShowAdd(false); setConfirmDeleteId(null); };
  const updateStatus = (id,status) => setTasks(p=>p.map(t=>t.id===id?{...t,status}:t));
  const updateField = (id,field,val) => setTasks(p=>p.map(t=>t.id===id?{...t,[field]:val}:t));
  const deleteTask = (id) => { setTasks(p=>p.filter(t=>t.id!==id)); setConfirmDeleteId(null); };
  const addTask = () => {
    if (!newTask.name.trim()) return;
    setTasks(p=>[...p,{...newTask,id:Date.now(),ownerId:selectedOwner}]);
    setNewTask({name:"",category:"",priority:"Medium",due:"",status:"Not Started",notes:""});
    setShowAdd(false);
  };
  const saveEdit = () => {
    if (!editTask || !editTask.name.trim()) return;
    setTasks(p => p.map(t => t.id === editTask.id ? {...editTask} : t));
    setEditTask(null);
  };

  const handleUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = "";
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = new Uint8Array(ev.target.result);
        const wb = XLSX.read(data, {type:"array", cellDates:true});
        const ws = wb.Sheets["Tasks"];
        if (!ws) throw new Error("Sheet named 'Tasks' not found. Please use the official template.");
        const rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:""});
        if (rows.length < 2) throw new Error("No data rows found in the Tasks sheet.");

        const PERF_MAP = {"on track":"green","at risk":"yellow","off track":"red"};
        const normStatus = (s) => {
          const v = String(s||"").trim().toLowerCase();
          if (v==="completed") return "Completed";
          if (v==="in progress") return "In Progress";
          return "Not Started";
        };
        const normPriority = (s) => {
          const v = String(s||"").trim().toLowerCase();
          if (v==="critical") return "Critical";
          if (v==="high") return "High";
          if (v==="low") return "Low";
          return "Medium";
        };

        // ── Step 1: Build owners dynamically from column B ──────────────
        const ownerMap = {}; // name (lowercase) → owner object
        rows.slice(1).forEach((row) => {
          const ownerName = String(row[1]||"").trim();
          if (ownerName && !ownerMap[ownerName.toLowerCase()]) {
            const id = Date.now() + Math.random();
            ownerMap[ownerName.toLowerCase()] = {
              id,
              name: ownerName,
              dept: "—",
              avatar: ownerName[0].toUpperCase()
            };
          }
        });
        const newOwners = Object.values(ownerMap);

        // ── Step 2: Build tasks using the new owner map ─────────────────
        const newTasks = [];
        let skipped = 0;
        rows.slice(1).forEach((row) => {
          if (!row[0] && !row[1]) return; // skip blank rows
          const name = String(row[0]||"").trim();
          if (!name) { skipped++; return; }

          const ownerName = String(row[1]||"").trim();
          const owner = ownerMap[ownerName.toLowerCase()];
          const category = String(row[2]||"").trim();
          const priority = normPriority(row[3]);

          let due = "";
          if (row[4]) {
            const d = row[4] instanceof Date ? row[4] : new Date(row[4]);
            if (!isNaN(d)) due = d.toISOString().split("T")[0];
          }

          const status = normStatus(row[5]);
          const perfRaw = String(row[6]||"").trim().toLowerCase();
          const performance = PERF_MAP[perfRaw] || "";
          const notes = String(row[7]||"").trim();

          newTasks.push({
            id: Date.now() + Math.random(),
            ownerId: owner ? owner.id : null,
            name, category, priority, due, status, performance, notes
          });
        });

        // ── Step 3: Replace everything with the file's data ─────────────
        setOwners(newOwners);
        setTasks(newTasks);
        setComments({});

        const msg = `✅ ${newTasks.length} task${newTasks.length!==1?"s":""} and ${newOwners.length} owner${newOwners.length!==1?"s":""} loaded from Excel.`;
        setUploadMsg({type:"success", text:msg});
        setTimeout(()=>setUploadMsg(null), 5000);
      } catch(err) {
        setUploadMsg({type:"error", text:"❌ " + err.message});
        setTimeout(()=>setUploadMsg(null), 8000);
      }
    };
    reader.readAsArrayBuffer(file);
  };

  const addOwner = () => {
    if (!newOwner.name.trim()) return;
    setOwners(p=>[...p,{id:Date.now(),name:newOwner.name.trim(),dept:newOwner.dept||"—",avatar:newOwner.name.trim()[0].toUpperCase()}]);
    setNewOwner({name:"",dept:""}); setShowAddOwner(false);
  };
  const deleteOwner = (id) => { setOwners(p=>p.filter(o=>o.id!==id)); setTasks(p=>p.filter(t=>t.ownerId!==id)); setConfirmDeleteOwnerId(null); };
  const addComment = (taskId) => {
    const text = (commentInput[taskId]||"").trim();
    if (!text) return;
    setComments(p=>({...p,[taskId]:[...(p[taskId]||[]),{text,time:new Date().toLocaleString()}]}));
    setCommentInput(p=>({...p,[taskId]:""}));
  };
  const startResize = (e) => {
    e.preventDefault();
    const startX = e.clientX, startW = taskColWidth;
    const onMove = (ev) => setTaskColWidth(Math.max(120, Math.min(600, startW + ev.clientX - startX)));
    const onUp = () => { document.removeEventListener("mousemove",onMove); document.removeEventListener("mouseup",onUp); };
    document.addEventListener("mousemove",onMove);
    document.addEventListener("mouseup",onUp);
  };
  const downloadReport = async () => {
    const ExcelJS = window.ExcelJS;
    const wb = new ExcelJS.Workbook();
    const today = new Date();
    const dateStr = today.toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});

    const NAVY=  "FF1B2A4A", GOLD="FFC9A84C", WHITE="FFFFFFFF", LGRAY="FFF8FAFC";
    const MGRAY= "FFE2E8F0", DGRAY="FF64748B", DARK="FF2D3748";
    const GREEN= "FF166534", GBGC="FFDCFCE7", BLUE="FF1E40AF", BBGC="FFDBEAFE";
    const AMBER= "FF92400E", ABGC="FFFEF3C7", RED="FF991B1B", RBGC="FFFEE2E2";
    const PURPLE="FF5B21B6", PBGC="FFEDE9FE", TEAL="FF115E59", TBGC="FFCCFBF1";

    const F  = c => ({type:"pattern",pattern:"solid",fgColor:{argb:c}});
    const Ft = (c=WHITE,sz=9,bold=false,italic=false) => ({name:"Arial",color:{argb:c},size:sz,bold,italic});
    const Al = (h="left",v="middle",w=false) => ({horizontal:h,vertical:v,wrapText:w});
    const Br = () => ({top:{style:"thin",color:{argb:MGRAY}},bottom:{style:"thin",color:{argb:MGRAY}},left:{style:"thin",color:{argb:MGRAY}},right:{style:"thin",color:{argb:MGRAY}}});
    const BrGold = () => ({top:{style:"thin",color:{argb:MGRAY}},bottom:{style:"medium",color:{argb:GOLD}},left:{style:"thin",color:{argb:MGRAY}},right:{style:"thin",color:{argb:MGRAY}}});

    const PRIO_C = {"Critical":[RBGC,RED],"High":[ABGC,AMBER],"Medium":[PBGC,PURPLE],"Low":[TBGC,TEAL]};
    const STAT_C = {"Completed":[GBGC,GREEN],"In Progress":[BBGC,BLUE],"Not Started":[LGRAY,DGRAY]};
    const PERF_C = {"On Track":[GBGC,GREEN],"At Risk":[ABGC,AMBER],"Off Track":[RBGC,RED]};
    const perfLabel = p => p==="green"?"On Track":p==="yellow"?"At Risk":p==="red"?"Off Track":"";

    const total=tasks.length, compl=tasks.filter(t=>t.status==="Completed").length;
    const inProg=tasks.filter(t=>t.status==="In Progress").length;
    const notStart=tasks.filter(t=>t.status==="Not Started").length;
    const overdue=tasks.filter(t=>t.due&&new Date(t.due)<today&&t.status!=="Completed").length;
    const offTrack=tasks.filter(t=>t.performance==="red").length;
    const pct=Math.round(compl/total*100)||0;

    // ── Executive Dashboard ──────────────────────────────────────────────
    const dash = wb.addWorksheet("Executive Dashboard");
    dash.views=[{showGridLines:false}];
    ["A","B","C","D","E","F","G"].forEach((c,i)=>{ dash.getColumn(c).width=i===0?1.5:17; });
    dash.getRow(1).height=6; dash.getRow(2).height=44; dash.getRow(3).height=22;
    dash.getRow(4).height=10; dash.getRow(9).height=26; dash.getRow(10).height=14;
    dash.getRow(11).height=28; dash.getRow(12).height=22;

    dash.mergeCells("B2:G2");
    Object.assign(dash.getCell("B2"),{value:"CLASSERA \u00b7 TASK PERFORMANCE REPORT",fill:F(NAVY),
      font:{name:"Arial",color:{argb:GOLD},size:20,bold:true},alignment:Al("center")});
    dash.mergeCells("B3:G3");
    Object.assign(dash.getCell("B3"),{value:`Prepared for: CEO   \u00b7   As of ${dateStr}   \u00b7   ${total} Tasks   \u00b7   ${owners.length} Owners`,
      fill:F(NAVY),font:{name:"Arial",color:{argb:"FFA0AEC0"},size:9,italic:true},alignment:Al("center")});

    [["B","TOTAL TASKS",String(total),"All active tasks",NAVY,GOLD],
     ["C","COMPLETED",String(compl),`${pct}% complete`,GBGC,GREEN],
     ["D","IN PROGRESS",String(inProg),"Currently active",BBGC,BLUE],
     ["E","NOT STARTED",String(notStart),"Pending kick-off",LGRAY,DGRAY],
     ["F","OVERDUE",String(overdue),"Past due date",RBGC,RED],
     ["G","OFF TRACK \uD83D\uDD34",String(offTrack),"Needs immediate action",RBGC,RED],
    ].forEach(([col,label,val,sub,bg,fg])=>{
      [[5,label,8,true,false],[6,val,30,true,false],[7,sub,8,false,true]].forEach(([r,v,sz,bold,italic])=>{
        const c=dash.getCell(`${col}${r}`);
        c.value=v; c.fill=F(bg); c.font={name:"Arial",color:{argb:fg},size:sz,bold,italic};
        c.alignment=Al("center"); c.border=Br();
        dash.getRow(r).height=[18,46,18][r-5];
      });
    });

    dash.mergeCells("B9:G9");
    const filled=Math.round(pct/100*28);
    Object.assign(dash.getCell("B9"),{value:`  Overall Progress   ${"\u2588".repeat(filled)}${"\u2591".repeat(28-filled)}   ${pct}% Complete`,
      fill:F(NAVY),font:{name:"Courier New",color:{argb:WHITE},size:10,bold:true},alignment:Al("left")});

    dash.mergeCells("B11:G11");
    Object.assign(dash.getCell("B11"),{value:"  \u25b8  PERFORMANCE BY OWNER",fill:F(NAVY),font:Ft(WHITE,10,true),alignment:Al("left")});

    ["Owner","Total","Completed","In Progress","Not Started","Performance"].forEach((h,i)=>{
      const c=dash.getCell(12,i+2); c.value=h; c.fill=F(DARK); c.font=Ft(WHITE,9,true);
      c.alignment=Al("center"); c.border=Br();
    });

    const sortedOwners=[...owners].sort((a,b)=>tasks.filter(t=>t.ownerId===b.id).length-tasks.filter(t=>t.ownerId===a.id).length);
    sortedOwners.forEach((o,ri)=>{
      const row=13+ri; dash.getRow(row).height=20;
      const ot=tasks.filter(t=>t.ownerId===o.id);
      const oc=ot.filter(t=>t.status==="Completed").length;
      const oOff=ot.filter(t=>t.performance==="red").length;
      const oRisk=ot.filter(t=>t.performance==="yellow").length;
      const oPct=Math.round(oc/ot.length*100)||0;
      const icon=oOff>0?"\uD83D\uDD34":oRisk>0?"\uD83D\uDFE1":"\uD83D\uDFE2";
      const bg=ri%2===0?LGRAY:WHITE;
      [[o.name,bg,NAVY,true,"left"],[ot.length,bg,DGRAY,false,"center"],
       [oc,oc>0?GBGC:bg,oc>0?GREEN:DGRAY,oc>0,"center"],
       [ot.filter(t=>t.status==="In Progress").length,bg,DGRAY,false,"center"],
       [ot.filter(t=>t.status==="Not Started").length,bg,DGRAY,false,"center"],
       [`${icon}  ${oPct}% done`,bg,DGRAY,false,"center"],
      ].forEach(([v,b,f,bld,ha],ci)=>{
        const cell=dash.getCell(row,ci+2);
        cell.value=v; cell.fill=F(b);
        cell.font={name:"Arial",color:{argb:f},size:9,bold:!!bld};
        cell.alignment=Al(ha); cell.border=Br();
      });
    });

    // ── All Tasks ────────────────────────────────────────────────────────
    const allWs=wb.addWorksheet("All Tasks");
    allWs.views=[{showGridLines:false,state:"frozen",ySplit:1}];
    [[5],[46],[14],[28],[11],[14],[14],[13]].forEach(([w],i)=>{ allWs.getColumn(i+1).width=w; });
    allWs.getRow(1).height=28;
    ["#","Task","Owner","Category","Priority","Due Date","Status","Performance"].forEach((h,i)=>{
      const c=allWs.getCell(1,i+1); c.value=h; c.fill=F(NAVY); c.font=Ft(WHITE,9,true);
      c.alignment=Al(i===0?"center":"left"); c.border=BrGold();
    });
    const sortedTasks=[...tasks].sort((a,b)=>{
      const oa=owners.find(o=>o.id===a.ownerId)?.name||"";
      const ob=owners.find(o=>o.id===b.ownerId)?.name||"";
      return oa.localeCompare(ob)||a.name.localeCompare(b.name);
    });
    sortedTasks.forEach((t,ri)=>{
      const row=ri+2; allWs.getRow(row).height=18;
      const o=owners.find(x=>x.id===t.ownerId);
      const bg=ri%2===0?LGRAY:WHITE;
      const isOv=t.due&&new Date(t.due)<today&&t.status!=="Completed";
      const pl=perfLabel(t.performance);
      const [pb,pf]=PRIO_C[t.priority]||[LGRAY,DGRAY];
      const [sb,sf]=STAT_C[t.status]||[LGRAY,DGRAY];
      const [pfb,pff]=PERF_C[pl]||[LGRAY,DGRAY];
      [[ri+1,F(bg),Ft(DGRAY,8),Al("center")],
       [t.name,F(bg),{name:"Arial",color:{argb:NAVY},size:9,bold:true},Al("left","middle",true)],
       [o?.name||"",F(bg),Ft(DGRAY,9),Al("center")],
       [t.category||"",F(bg),Ft(DGRAY,9),Al("left","middle",true)],
       [t.priority,F(pb),Ft(pf,9,true),Al("center")],
       [t.due||"",isOv?F(RBGC):F(bg),isOv?Ft(RED,9,true):Ft(DGRAY,9),Al("center")],
       [t.status,F(sb),Ft(sf,9,true),Al("center")],
       [pl,F(pfb),Ft(pff,9,true),Al("center")],
      ].forEach(([v,fill,font,align],ci)=>{
        const c=allWs.getCell(row,ci+1); c.value=v; c.fill=fill; c.font=font; c.alignment=align; c.border=Br();
      });
    });

    // ── One sheet per owner ──────────────────────────────────────────────
    sortedOwners.forEach(o=>{
      const ot=tasks.filter(t=>t.ownerId===o.id)
        .sort((a,b)=>{const ord={"In Progress":0,"Not Started":1,"Completed":2};return(ord[a.status]??3)-(ord[b.status]??3)||a.name.localeCompare(b.name);});
      if(!ot.length) return;

      const oc=ot.filter(t=>t.status==="Completed").length;
      const oi=ot.filter(t=>t.status==="In Progress").length;
      const on=ot.filter(t=>t.status==="Not Started").length;
      const ov=ot.filter(t=>t.due&&new Date(t.due)<today&&t.status!=="Completed").length;
      const oOn=ot.filter(t=>t.performance==="green").length;
      const oAt=ot.filter(t=>t.performance==="yellow").length;
      const oOff=ot.filter(t=>t.performance==="red").length;

      const ws=wb.addWorksheet(o.name.substring(0,31));
      ws.views=[{showGridLines:false,state:"frozen",ySplit:3}];
      [[5],[46],[28],[11],[14],[14],[13],[30]].forEach(([w],i)=>{ ws.getColumn(i+1).width=w; });
      ws.getRow(1).height=38; ws.getRow(2).height=34; ws.getRow(3).height=24;

      ws.mergeCells("A1:H1");
      Object.assign(ws.getCell("A1"),{value:`  ${o.name.toUpperCase()}`,fill:F(NAVY),
        font:{name:"Arial",color:{argb:GOLD},size:14,bold:true},alignment:Al("left")});

      [[`TOTAL\n${ot.length}`,NAVY,GOLD],[`COMPLETED\n${oc}`,oc>0?GBGC:LGRAY,oc>0?GREEN:DGRAY],

                    {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                  </select>
                  <input placeholder="Notes (optional)" value={newTask.notes} onChange={e=>setNewTask(p=>({...p,notes:e.target.value}))} style={{width:"100%",padding:"7px 12px",border:"1px solid #CBD5E0",borderRadius:6,fontSize:12,boxSizing:"border-box",marginBottom:10}} />
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={addTask} style={{background:"#1B2A4A",color:"white",border:"none",padding:"7px 18px",borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:12}}>Save</button>
                    <button onClick={()=>setShowAdd(false)} style={{background:"#E2E8F0",color:"#4A5568",border:"none",padding:"7px 18px",borderRadius:6,cursor:"pointer",fontSize:12}}>Cancel</button>
                  </div>
                </div>
              )}
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12,tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:"40px"}} />
                    <col style={{width:taskColWidth+"px"}} />
                    <col style={{width:"90px"}} />
                    <col style={{width:"150px"}} />
                    <col style={{width:"90px"}} />
                    <col style={{width:"120px"}} />
                    <col style={{width:"80px"}} />
                    <col style={{width:"130px"}} />
                    <col style={{width:"160px"}} />
                    <col style={{width:"70px"}} />
                  </colgroup>
                  <thead>
                    <tr style={{background:"#F7FAFC"}}>
                      <th style={{padding:"9px 10px",textAlign:"left",fontWeight:700,color:"#4A5568",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #E2E8F0",width:"40px"}}>#</th>
                      <th style={{padding:"9px 10px",textAlign:"left",fontWeight:700,color:"#4A5568",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #E2E8F0",position:"relative",userSelect:"none"}}>
                        Task
                        <span onMouseDown={startResize} style={{position:"absolute",right:0,top:0,bottom:0,width:8,cursor:"col-resize",display:"flex",alignItems:"center",justifyContent:"center"}} title="Drag to resize">
                          <span style={{width:3,height:18,background:"#CBD5E0",borderRadius:2,display:"block"}} />
                        </span>
                      </th>
                      <th style={{padding:"9px 10px",textAlign:"left",fontWeight:700,color:"#4A5568",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #E2E8F0"}}>Task Performance</th>
                      {["Category","Priority","Due","Days Late","Status","Notes",""].map((h,i)=>(
                        <th key={i} style={{padding:"9px 10px",textAlign:"left",fontWeight:700,color:"#4A5568",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #E2E8F0"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {filteredTasks.map((t,i)=>(
                      <Fragment key={t.id}>
                        <tr style={{background:isOverdue(t)?"#FFF5F5":i%2===0?"#FAFBFC":"white",borderBottom:"1px solid #EDF2F7",borderLeft:isOverdue(t)?"3px solid #EF4444":"3px solid transparent"}}>
                          <td style={{padding:"9px 10px",color:"#A0AEC0",fontSize:11,fontWeight:700}}>{seqNum[t.id]}</td>
                          <td style={{padding:"9px 10px",fontWeight:600,overflow:"hidden"}}><span style={{display:"block",wordBreak:"break-word",whiteSpace:"normal"}}>{t.name}</span></td>
                          <td style={{padding:"9px 10px",textAlign:"center"}}>
                            <select value={t.performance||""} onChange={e=>updateField(t.id,"performance",e.target.value)}
                              style={{border:"1px solid #E2E8F0",borderRadius:6,padding:"3px 6px",fontSize:13,background:t.performance==="red"?"#FEE2E2":t.performance==="yellow"?"#FEF3C7":t.performance==="green"?"#DCFCE7":"white",cursor:"pointer",width:48,textAlign:"center"}}>
                              <option value="">—</option>
                              <option value="green">🟢</option>
                              <option value="yellow">🟡</option>
                              <option value="red">🔴</option>
                            </select>
                          </td>
                          <td style={{padding:"9px 10px"}}>
                            <select value={t.category} onChange={e=>updateField(t.id,"category",e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:6,padding:"3px 6px",fontSize:11,background:"white",maxWidth:140}}>
                              <option value="">—</option>
                              {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                            </select>
                          </td>
                          <td style={{padding:"9px 10px"}}>
                            <select value={t.priority} onChange={e=>updateField(t.id,"priority",e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:6,padding:"3px 6px",fontSize:11,background:"white"}}>
                              {Object.keys(PRIORITY_CFG).map(p=><option key={p}>{p}</option>)}
                            </select>
                          </td>
                          <td style={{padding:"9px 10px"}}>
                            <input type="date" value={t.due||""} onChange={e=>updateField(t.id,"due",e.target.value)}
                              style={{border:"1px solid "+(isOverdue(t)?"#FCA5A5":"#E2E8F0"),borderRadius:6,padding:"3px 6px",fontSize:11,background:isOverdue(t)?"#FEF2F2":"white",color:isOverdue(t)?"#DC2626":"inherit"}} />
                          </td>
                          <td style={{padding:"9px 10px",textAlign:"center"}}>
                            {daysOverdue(t)>0 ? <span style={{background:"#FEE2E2",color:"#DC2626",fontWeight:800,fontSize:11,padding:"2px 8px",borderRadius:10}}>+{daysOverdue(t)}d</span> : <span style={{color:"#A0AEC0",fontSize:11}}>—</span>}
                          </td>
                          <td style={{padding:"9px 10px"}}>
                            <select value={t.status} onChange={e=>updateStatus(t.id,e.target.value)} style={{border:"1px solid #E2E8F0",borderRadius:6,padding:"3px 6px",fontSize:11,background:"white"}}>
                              {STATUS_KEYS.map(s=><option key={s}>{s}</option>)}
                            </select>
                          </td>
                          <td style={{padding:"9px 10px"}}>
                            <input value={t.notes||""} onChange={e=>updateField(t.id,"notes",e.target.value)} placeholder="Add note..."
                              style={{border:"1px solid #E2E8F0",borderRadius:6,padding:"3px 8px",fontSize:11,background:"white",width:"100%",boxSizing:"border-box"}} />
                          </td>
                          <td style={{padding:"9px 6px",textAlign:"center"}}>
                            <div style={{display:"flex",gap:3,justifyContent:"center"}}>
                              <button onClick={()=>setActiveCommentTask(activeCommentTask===t.id?null:t.id)}
                                style={{background:"none",border:"none",cursor:"pointer",fontSize:13,padding:"2px 3px",color:(comments[t.id]||[]).length>0?"#2563EB":"#CBD5E0"}}>
                                💬{(comments[t.id]||[]).length>0&&<sup style={{background:"#2563EB",color:"white",borderRadius:"50%",padding:"0 3px",fontSize:8,fontWeight:900}}>{(comments[t.id]||[]).length}</sup>}
                              </button>
                              <button onClick={()=>setEditTask({...t})} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E0",fontSize:14,padding:"2px 3px"}}
                                onMouseEnter={e=>e.currentTarget.style.color="#1B2A4A"} onMouseLeave={e=>e.currentTarget.style.color="#CBD5E0"} title="Edit task">✏️</button>
                              {confirmDeleteId===t.id ? (
                                <span style={{display:"inline-flex",gap:3}}>
                                  <button onClick={()=>deleteTask(t.id)} style={{background:"#E74C3C",color:"white",border:"none",padding:"2px 6px",borderRadius:4,cursor:"pointer",fontSize:11,fontWeight:700}}>Yes</button>
                                  <button onClick={()=>setConfirmDeleteId(null)} style={{background:"#E2E8F0",color:"#4A5568",border:"none",padding:"2px 6px",borderRadius:4,cursor:"pointer",fontSize:11}}>No</button>
                                </span>
                              ) : (
                                <button onClick={()=>setConfirmDeleteId(t.id)} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E0",fontSize:14}}
                                  onMouseEnter={e=>e.currentTarget.style.color="#E74C3C"} onMouseLeave={e=>e.currentTarget.style.color="#CBD5E0"}>🗑</button>
                              )}
                            </div>
                          </td>
                        </tr>
                        {activeCommentTask===t.id && (
                          <tr style={{background:"#F8FAFF"}}>
                            <td colSpan={10} style={{padding:"12px 16px",borderBottom:"1px solid #E2E8F0"}}>
                              <div style={{fontSize:11,fontWeight:700,color:"#1B2A4A",marginBottom:8}}>💬 Comments</div>
                              {(comments[t.id]||[]).map((c,ci)=>(
                                <div key={ci} style={{background:"white",border:"1px solid #E2E8F0",borderRadius:8,padding:"8px 12px",marginBottom:6}}>
                                  <div style={{fontSize:11,color:"#1B2A4A"}}>{c.text}</div>
                                  <div style={{fontSize:10,color:"#A0AEC0",marginTop:3}}>🕐 {c.time}</div>
                                </div>
                              ))}
                              <div style={{display:"flex",gap:8,marginTop:8}}>
                                <input value={commentInput[t.id]||""} onChange={e=>setCommentInput(p=>({...p,[t.id]:e.target.value}))}
                                  onKeyDown={e=>e.key==="Enter"&&addComment(t.id)} placeholder="Add a comment... (Enter to save)"
                                  style={{flex:1,padding:"6px 12px",border:"1px solid #CBD5E0",borderRadius:6,fontSize:12}} />
                                <button onClick={()=>addComment(t.id)} style={{background:"#1B2A4A",color:"white",border:"none",padding:"6px 14px",borderRadius:6,cursor:"pointer",fontSize:12,fontWeight:700}}>Post</button>
                              </div>
                            </td>
                          </tr>
                        )}
                      </Fragment>
                    ))}
                    {filteredTasks.length===0&&<tr><td colSpan={10} style={{padding:24,textAlign:"center",color:"#A0AEC0"}}>No tasks found</td></tr>}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        )}

        {/* PERFORMANCE DASHBOARD */}
        {view==="performance" && !selectedOwner && (() => {
          const green = tasks.filter(t=>t.performance==="green");
          const yellow = tasks.filter(t=>t.performance==="yellow");
          const red = tasks.filter(t=>t.performance==="red");
          const rated = tasks.filter(t=>t.performance);
          const unrated = tasks.filter(t=>!t.performance);
          const pct = (n) => rated.length ? Math.round(n/rated.length*100) : 0;

          const ownerPerf = owners.map(o => {
            const ot = tasks.filter(t=>t.ownerId===o.id);
            return {
              ...o,
              total: ot.length,
              green: ot.filter(t=>t.performance==="green").length,
              yellow: ot.filter(t=>t.performance==="yellow").length,
              red: ot.filter(t=>t.performance==="red").length,
              unrated: ot.filter(t=>!t.performance).length,
              rated: ot.filter(t=>t.performance).length,
            };
          }).filter(o=>o.total>0).sort((a,b)=>b.red-a.red||b.yellow-a.yellow);

          const catPerf = CATEGORIES.map(cat => {
            const ct = tasks.filter(t=>t.category===cat);
            return {
              cat,
              total: ct.length,
              green: ct.filter(t=>t.performance==="green").length,
              yellow: ct.filter(t=>t.performance==="yellow").length,
              red: ct.filter(t=>t.performance==="red").length,
            };
          }).filter(c=>c.total>0).sort((a,b)=>b.red-a.red);

          const redTasks = tasks.filter(t=>t.performance==="red").sort((a,b)=>daysOverdue(b)-daysOverdue(a));
          const yellowTasks = tasks.filter(t=>t.performance==="yellow");

          return (
            <div>
              {/* KPI Row */}
              <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:14,marginBottom:20}}>
                {[
                  {l:"Rated Tasks",v:rated.length,sub:`of ${tasks.length} total`,bg:"#EBF8FF",c:"#1B2A4A"},
                  {l:"🟢 On Track",v:green.length,sub:pct(green.length)+"%  of rated",bg:"#DCFCE7",c:"#15803D"},
                  {l:"🟡 At Risk",v:yellow.length,sub:pct(yellow.length)+"% of rated",bg:"#FEF9C3",c:"#854D0E"},
                  {l:"🔴 Off Track",v:red.length,sub:pct(red.length)+"% of rated",bg:"#FEE2E2",c:"#991B1B"},
                  {l:"⚪ Unrated",v:unrated.length,sub:`of ${tasks.length} total`,bg:"#F1F5F9",c:"#64748B"},
                ].map(k=>(
                  <div key={k.l} style={{background:k.bg,borderRadius:12,padding:"18px 20px"}}>
                    <div style={{fontSize:11,fontWeight:700,color:k.c,textTransform:"uppercase",marginBottom:4}}>{k.l}</div>
                    <div style={{fontSize:36,fontWeight:900,color:k.c,lineHeight:1}}>{k.v}</div>
                    <div style={{fontSize:11,color:k.c,opacity:0.7,marginTop:4}}>{k.sub}</div>
                  </div>
                ))}
              </div>

              <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:16}}>
                {/* Owner Breakdown */}
                <div style={{flex:1,background:"white",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#1B2A4A",textTransform:"uppercase",marginBottom:16}}>Performance by Owner</div>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"#F7FAFC"}}>
                        {["Owner","Dept","🟢","🟡","🔴","Rated","Performance Bar"].map((h,i)=>(
                          <th key={i} style={{padding:"8px 10px",textAlign:i<2?"left":"center",fontWeight:700,color:"#4A5568",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #E2E8F0"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {ownerPerf.map((o,i)=>{
                        const ratedCount = o.green+o.yellow+o.red;
                        return (
                          <tr key={o.id} onClick={()=>navTo("owner",o.id)} style={{background:i%2===0?"#FAFBFC":"white",borderBottom:"1px solid #EDF2F7",cursor:"pointer"}}
                            onMouseEnter={e=>e.currentTarget.style.background="#EFF6FF"}
                            onMouseLeave={e=>e.currentTarget.style.background=i%2===0?"#FAFBFC":"white"}>
                            <td style={{padding:"9px 10px",fontWeight:700,color:"#1B2A4A"}}>{o.name}</td>
                            <td style={{padding:"9px 10px",color:"#718096",fontSize:11}}>{o.dept}</td>
                            <td style={{padding:"9px 10px",textAlign:"center",fontWeight:700,color:"#15803D"}}>{o.green||"—"}</td>
                            <td style={{padding:"9px 10px",textAlign:"center",fontWeight:700,color:"#854D0E"}}>{o.yellow||"—"}</td>
                            <td style={{padding:"9px 10px",textAlign:"center",fontWeight:700,color:"#991B1B"}}>{o.red||"—"}</td>
                            <td style={{padding:"9px 10px",textAlign:"center",color:"#718096"}}>{ratedCount}/{o.total}</td>
                            <td style={{padding:"9px 10px",minWidth:120}}>
                              {ratedCount>0 ? (
                                <div style={{display:"flex",height:14,borderRadius:7,overflow:"hidden",gap:1}}>
                                  {o.green>0&&<div style={{flex:o.green,background:"#22C55E",borderRadius:"7px 0 0 7px"}} title={`Green: ${o.green}`} />}
                                  {o.yellow>0&&<div style={{flex:o.yellow,background:"#EAB308"}} title={`Yellow: ${o.yellow}`} />}
                                  {o.red>0&&<div style={{flex:o.red,background:"#EF4444",borderRadius:"0 7px 7px 0"}} title={`Red: ${o.red}`} />}
                                </div>
                              ) : <span style={{fontSize:11,color:"#CBD5E0"}}>No ratings yet</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>

                {/* Category Breakdown */}
                <div style={{width:280,flexShrink:0,background:"white",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#1B2A4A",textTransform:"uppercase",marginBottom:16}}>By Category</div>
                  {catPerf.map(c=>(
                    <div key={c.cat} style={{marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:11,fontWeight:600,color:"#4A5568"}}>{c.cat}</span>
                        <span style={{fontSize:11,color:"#718096"}}>{c.green+c.yellow+c.red}/{c.total}</span>
                      </div>
                      <div style={{display:"flex",height:10,borderRadius:5,overflow:"hidden",background:"#F1F5F9",gap:1}}>
                        {c.green>0&&<div style={{flex:c.green,background:"#22C55E"}} />}
                        {c.yellow>0&&<div style={{flex:c.yellow,background:"#EAB308"}} />}
                        {c.red>0&&<div style={{flex:c.red,background:"#EF4444"}} />}
                      </div>
                      <div style={{display:"flex",gap:8,marginTop:3}}>
                        {c.green>0&&<span style={{fontSize:10,color:"#15803D"}}>🟢 {c.green}</span>}
                        {c.yellow>0&&<span style={{fontSize:10,color:"#854D0E"}}>🟡 {c.yellow}</span>}
                        {c.red>0&&<span style={{fontSize:10,color:"#991B1B"}}>🔴 {c.red}</span>}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Red & Yellow task lists */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16}}>
                <div style={{background:"white",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#991B1B",textTransform:"uppercase",marginBottom:14}}>🔴 Off Track Tasks ({redTasks.length})</div>
                  {redTasks.length===0 ? <div style={{color:"#A0AEC0",fontSize:12,textAlign:"center",padding:20}}>No off-track tasks 🎉</div> : (
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr style={{background:"#FEF2F2"}}>
                        <th style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#991B1B",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #FECACA",width:"40px"}}>{"#"}</th>
                        {["Task","Owner","Due",""].map((h,i)=><th key={i} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#991B1B",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #FECACA"}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {redTasks.map((t,i)=>{
                          const o=owners.find(o=>o.id===t.ownerId);
                          return (
                            <tr key={t.id} style={{background:i%2===0?"#FFF5F5":"white",borderBottom:"1px solid #FEE2E2"}}>
                              <td style={{padding:"8px 10px",color:"#A0AEC0",fontSize:11,fontWeight:700}}>{seqNum[t.id]}</td>
                              <td style={{padding:"8px 10px",fontWeight:600,color:"#1B2A4A",maxWidth:200}}><span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span></td>
                              <td style={{padding:"8px 10px",color:"#718096"}}>{o&&o.name}</td>
                              <td style={{padding:"8px 10px",color:isOverdue(t)?"#DC2626":"#718096",fontWeight:isOverdue(t)?700:400}}>{t.due||"—"}</td>
                              <td style={{padding:"8px 6px",textAlign:"center"}}>
                                <button onClick={()=>setEditTask({...t})} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E0",fontSize:14,padding:"2px 4px"}}
                                  onMouseEnter={e=>e.currentTarget.style.color="#1B2A4A"} onMouseLeave={e=>e.currentTarget.style.color="#CBD5E0"} title="Edit task">✏️</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
                <div style={{background:"white",borderRadius:12,padding:24,boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}}>
                  <div style={{fontSize:13,fontWeight:800,color:"#854D0E",textTransform:"uppercase",marginBottom:14}}>🟡 At Risk Tasks ({yellowTasks.length})</div>
                  {yellowTasks.length===0 ? <div style={{color:"#A0AEC0",fontSize:12,textAlign:"center",padding:20}}>No at-risk tasks 🎉</div> : (
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                      <thead><tr style={{background:"#FEFCE8"}}>
                        <th style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#854D0E",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #FEF08A",width:"40px"}}>{"#"}</th>
                        {["Task","Owner","Due",""].map((h,i)=><th key={i} style={{padding:"7px 10px",textAlign:"left",fontWeight:700,color:"#854D0E",fontSize:11,textTransform:"uppercase",borderBottom:"2px solid #FEF08A"}}>{h}</th>)}
                      </tr></thead>
                      <tbody>
                        {yellowTasks.map((t,i)=>{
                          const o=owners.find(o=>o.id===t.ownerId);
                          return (
                            <tr key={t.id} style={{background:i%2===0?"#FEFCE8":"white",borderBottom:"1px solid #FEF9C3"}}>
                              <td style={{padding:"8px 10px",color:"#A0AEC0",fontSize:11,fontWeight:700}}>{seqNum[t.id]}</td>
                              <td style={{padding:"8px 10px",fontWeight:600,color:"#1B2A4A",maxWidth:200}}><span style={{display:"block",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.name}</span></td>
                              <td style={{padding:"8px 10px",color:"#718096"}}>{o&&o.name}</td>
                              <td style={{padding:"8px 10px",color:isOverdue(t)?"#DC2626":"#718096",fontWeight:isOverdue(t)?700:400}}>{t.due||"—"}</td>
                              <td style={{padding:"8px 6px",textAlign:"center"}}>
                                <button onClick={()=>setEditTask({...t})} style={{background:"none",border:"none",cursor:"pointer",color:"#CBD5E0",fontSize:14,padding:"2px 4px"}}
                                  onMouseEnter={e=>e.currentTarget.style.color="#1B2A4A"} onMouseLeave={e=>e.currentTarget.style.color="#CBD5E0"} title="Edit task">✏️</button>
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  )}
                </div>
              </div>
            </div>
          );
        })()}

        </>)}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
